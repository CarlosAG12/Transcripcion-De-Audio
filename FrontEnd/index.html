<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Transcripcion Audio</title>
  </head>
  <body>
    <header>
        <nav class="navegador-principal">
            <a href="#inicio" class="ancar-principal">Inicio</a>
            <a href="#subir-audio" class="ancar-principal">Subir Audio</a>
        </nav>
    </header>

    <main>
        <section class="contenedor-subir-audio">
                <h1>Ingresa tu audio y lo recibes transcrito</h1>
                <form id="formulario">
                    <label for="text">Nombre del archivo:</label>
                    <input type="text" name="nombre">
                    <label for="file">Ingresa tu archivo:</label>
                    <input type="file" name="archivo">
                    <button type="submit" id="enviar">Enviar</button>
                </form>
        </section>
    </main>

    <footer>Todos los derechos reservados -- Carlos Acosta 2026</footer>
    <script src="main.js"></script>
  </body>
</html>
